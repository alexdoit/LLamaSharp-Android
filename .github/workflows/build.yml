name: Build Llama for Android
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          ref: master # Берем самую свежую версию

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b # Стабильная версия NDK

      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_C_FLAGS="-march=armv8.7a" \
            -DGGML_OPENMP=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_CPU_ALL_VARIANTS=ON # Включает поддержку i8mm и SVE
          
          cmake --build . --config Release --target llama

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libllama-android-arm64
          path: build/src/libllama.so
